on:
  push:
    branches:
    - '**'
  pull_request:
    branches:
    - '**'

jobs:
  check:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Test with pytest
      run: |
        python check_recipes.py
