[tool.ruff]
# Exclude common directories
exclude = [".git", ".venv", "venv", "__pycache__", ".pytest_cache"]

# Set the line length
line-length = 88


# Enable ruff's default rules plus common Python best practices
[tool.ruff.lint]
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # isort
    "I",
    # pylint
    "PL",
]

 
# Add more rule categories as needed:
# - "I" for isort (import sorting)
# - "C90" for McCabe complexity
# - "UP" for pyupgrade
# - "B" for flake8-bugbear
# etc.

ignore = []
